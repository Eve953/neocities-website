    <script>
        const fortunes = [
            '"YOU WILL HAVE AN AMAZING DAY!"',
            '"YOUR CODE WILL WORK ON THE FIRST TRY TODAY."',
            '"YOU WILL LEARN SOMETHING NEW AND COOL THIS WEEK."',
            '"EXCELLENT VIBES ARE HEADED YOUR WAY!"',
            '"YOU WILL EAT A YUMMY TREAT SOON."',
            '"YOUR NEXT PROJECT WILL BE A HUGE SUCCESS!"'
        ];

        function triggerLocalFortune() {
            const outputElement = document.getElementById('fortune-output');
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            outputElement.textContent = fortunes[randomIndex];
        }

        let soundButtons = document.querySelectorAll('.audio-panel button');
        let context = null;

        soundButtons.forEach(button => {
            button.addEventListener('click', () => {
                let waveforms = ['sine', 'square', 'sawtooth', 'triangle'];
                let frequencies = [147, 220, 294, 440];

                let randomWaveform = waveforms[Math.floor(Math.random() * waveforms.length)];
                let randomFrequency = frequencies[Math.floor(Math.random() * frequencies.length)];

                if (context === null) {
                    context = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (context.state === 'suspended') {
                    context.resume();
                }

                let oscillator = context.createOscillator();
                let gainNode = context.createGain();

                oscillator.type = randomWaveform;
                oscillator.frequency.setValueAtTime(randomFrequency, context.currentTime);

                gainNode.gain.setValueAtTime(0.04, context.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, context.currentTime + 0.4);

                oscillator.connect(gainNode);
                gainNode.connect(context.destination);

                oscillator.start();
                oscillator.stop(context.currentTime + 0.4);
            });
        });
    </script>
